{% extends 'base.html' %}
{% block title %}Edit Patient{% endblock %}
{% block page_title %}Edit Patient{% endblock %}
{% block content %}
<div class="page-header"><div><h1>Edit: {{ patient.patient_name }}</h1></div><a href="{{ url_for('patient_view',pid=patient.id) }}" class="btn btn-secondary">← Back</a></div>
<div class="card"><div class="card-body">
<form method="POST">
  <div class="form-grid">
    <div class="form-group"><label class="form-label">Patient Name *</label><input type="text" name="patient_name" class="form-control" value="{{ patient.patient_name }}" required></div>
    <div class="form-group"><label class="form-label">Guardian</label><input type="text" name="guardian_name" class="form-control" value="{{ patient.guardian_name or '' }}"></div>
    <div class="form-group"><label class="form-label">Gender</label>
      <select name="gender" class="form-control">{% for g in ['','Male','Female','Other'] %}<option {% if patient.gender==g %}selected{% endif %}>{{ g }}</option>{% endfor %}</select></div>
    <div class="form-group"><label class="form-label">DOB</label><input type="date" name="dob" class="form-control" value="{{ patient.dob or '' }}"></div>
    <div class="form-group"><label class="form-label">Age</label><input type="number" name="age" class="form-control" value="{{ patient.age or 0 }}"></div>
    <div class="form-group"><label class="form-label">Blood Group</label>
      <select name="blood_group" class="form-control">{% for bg in ['','A+','A-','B+','B-','AB+','AB-','O+','O-'] %}<option {% if patient.blood_group==bg %}selected{% endif %}>{{ bg }}</option>{% endfor %}</select></div>
    <div class="form-group"><label class="form-label">Mobile</label><input type="text" name="mobileno" class="form-control" value="{{ patient.mobileno or '' }}"></div>
    <div class="form-group"><label class="form-label">Email</label><input type="email" name="email" class="form-control" value="{{ patient.email or '' }}"></div>
    <div class="form-group"><label class="form-label">Patient Type</label>
      <select name="patient_type" class="form-control"><option value="opd" {% if patient.patient_type=='opd' %}selected{% endif %}>OPD</option><option value="ipd" {% if patient.patient_type=='ipd' %}selected{% endif %}>IPD</option></select></div>
  </div>
  <div class="form-group mt-3"><label class="form-label">Address</label><textarea name="address" class="form-control">{{ patient.address or '' }}</textarea></div>
  <div class="form-group mt-2"><label class="form-label">Notes</label><textarea name="note" class="form-control">{{ patient.note or '' }}</textarea></div>
  <div class="mt-4 flex gap-2"><button type="submit" class="btn btn-primary">Update</button><a href="{{ url_for('patient_view',pid=patient.id) }}" class="btn btn-secondary">Cancel</a></div>
</form>
</div></div>
{% endblock %}
