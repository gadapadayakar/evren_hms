{% extends 'base.html' %}{% block title %}Add Vehicle{% endblock %}{% block page_title %}Add Vehicle{% endblock %}{% block content %}
<div class="page-header"><div><h1>Add Vehicle</h1></div><a href="{{ url_for('vehicle_list') }}" class="btn btn-secondary">← Back</a></div>
<div class="card"><div class="card-body"><form method="POST">
  <div class="form-grid">
    <div class="form-group"><label class="form-label">Vehicle Name *</label><input type="text" name="vehicle_name" class="form-control" required placeholder="e.g. Ambulance 1"></div>
    <div class="form-group"><label class="form-label">Vehicle Number</label><input type="text" name="vehicle_number" class="form-control"></div>
    <div class="form-group"><label class="form-label">Type</label>
      <select name="vehicle_type" class="form-control"><option value="ambulance">Ambulance</option><option value="van">Staff Van</option><option value="car">Car</option><option value="bus">Bus</option></select></div>
    <div class="form-group"><label class="form-label">Driver Name</label><input type="text" name="driver_name" class="form-control"></div>
    <div class="form-group"><label class="form-label">Driver Phone</label><input type="text" name="driver_phone" class="form-control"></div>
    <div class="form-group"><label class="form-label">Fuel Type</label>
      <select name="fuel_type" class="form-control"><option>Diesel</option><option>Petrol</option><option>CNG</option><option>Electric</option></select></div>
  </div>
  <div class="mt-4 flex gap-2"><button type="submit" class="btn btn-primary">Add Vehicle</button><a href="{{ url_for('vehicle_list') }}" class="btn btn-secondary">Cancel</a></div>
</form></div></div>{% endblock %}
