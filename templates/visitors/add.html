{% extends 'base.html' %}{% block title %}Add Visitor{% endblock %}{% block page_title %}Register Visitor{% endblock %}{% block content %}
<div class="page-header"><div><h1>Register Visitor</h1></div><a href="{{ url_for('visitors_list') }}" class="btn btn-secondary">← Back</a></div>
<div class="card"><div class="card-body"><form method="POST">
  <div class="form-grid">
    <div class="form-group"><label class="form-label">Visitor Name *</label><input type="text" name="visitor_name" class="form-control" required></div>
    <div class="form-group"><label class="form-label">Patient to Visit</label>
      <select name="patient_id" class="form-control"><option value="0">Select (Optional)…</option>{% for p in patients %}<option value="{{ p.id }}">{{ p.patient_name }} ({{ p.patient_unique_id }})</option>{% endfor %}</select></div>
    <div class="form-group"><label class="form-label">Purpose</label><input type="text" name="purpose" class="form-control"></div>
    <div class="form-group"><label class="form-label">Visit Date</label><input type="date" name="visit_date" class="form-control" value="{{ today }}"></div>
    <div class="form-group"><label class="form-label">Visit Time</label><input type="time" name="visit_time" class="form-control"></div>
  </div>
  <div class="form-group mt-3"><label class="form-label">Note</label><textarea name="note" class="form-control" rows="2"></textarea></div>
  <div class="mt-4 flex gap-2"><button type="submit" class="btn btn-primary">Register</button><a href="{{ url_for('visitors_list') }}" class="btn btn-secondary">Cancel</a></div>
</form></div></div>{% endblock %}
