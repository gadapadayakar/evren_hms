{% extends 'base.html' %}{% block title %}Add Staff{% endblock %}{% block page_title %}Add Staff Member{% endblock %}{% block content %}
<div class="page-header"><div><h1>Add Staff Member</h1></div><a href="{{ url_for('staff_list') }}" class="btn btn-secondary">← Back</a></div>
<div class="card"><div class="card-body"><form method="POST">
  <div class="form-section">Personal Information</div>
  <div class="form-grid">
    <div class="form-group"><label class="form-label">First Name *</label><input type="text" name="name" class="form-control" required></div>
    <div class="form-group"><label class="form-label">Last Name</label><input type="text" name="surname" class="form-control"></div>
    <div class="form-group"><label class="form-label">Email *</label><input type="email" name="email" class="form-control" required></div>
    <div class="form-group"><label class="form-label">Password *</label><input type="password" name="password" class="form-control" required></div>
    <div class="form-group"><label class="form-label">Phone</label><input type="text" name="phone" class="form-control"></div>
    <div class="form-group"><label class="form-label">Mobile</label><input type="text" name="mobileno" class="form-control"></div>
    <div class="form-group"><label class="form-label">Gender</label>
      <select name="gender" class="form-control"><option value="">Select…</option><option>Male</option><option>Female</option><option>Other</option></select></div>
    <div class="form-group"><label class="form-label">Blood Group</label>
      <select name="blood_group" class="form-control"><option value="">Select…</option>{% for bg in ['A+','A-','B+','B-','AB+','AB-','O+','O-'] %}<option>{{ bg }}</option>{% endfor %}</select></div>
    <div class="form-group"><label class="form-label">Date of Birth</label><input type="date" name="dob" class="form-control"></div>
    <div class="form-group"><label class="form-label">Joining Date</label><input type="date" name="date_of_joining" class="form-control"></div>
  </div>
  <div class="form-section">Professional Details</div>
  <div class="form-grid">
    <div class="form-group"><label class="form-label">Role *</label>
      <select name="role_id" class="form-control" required>{% for r in roles %}<option value="{{ r.id }}">{{ r.name }}</option>{% endfor %}</select></div>
    <div class="form-group"><label class="form-label">Department</label>
      <select name="department" class="form-control"><option value="">Select…</option>{% for d in departments %}<option value="{{ d.id }}">{{ d.department_name }}</option>{% endfor %}</select></div>
    <div class="form-group"><label class="form-label">Designation</label>
      <select name="designation" class="form-control"><option value="">Select…</option>{% for d in designations %}<option value="{{ d.id }}">{{ d.designation }}</option>{% endfor %}</select></div>
    <div class="form-group"><label class="form-label">Qualification</label><input type="text" name="qualification" class="form-control"></div>
    <div class="form-group"><label class="form-label">Experience</label><input type="text" name="experience" class="form-control" placeholder="e.g. 5 years"></div>
    <div class="form-group"><label class="form-label">Basic Salary</label><input type="number" name="basic_salary" class="form-control" step="0.01" value="0"></div>
  </div>
  <div class="form-section">Bank & Emergency</div>
  <div class="form-grid">
    <div class="form-group"><label class="form-label">Bank Name</label><input type="text" name="bank_name" class="form-control"></div>
    <div class="form-group"><label class="form-label">Bank Account</label><input type="text" name="bank_account" class="form-control"></div>
    <div class="form-group"><label class="form-label">Emergency Contact</label><input type="text" name="emergency_contact" class="form-control"></div>
  </div>
  <div class="form-group mt-3"><label class="form-label">Address</label><textarea name="address" class="form-control"></textarea></div>
  <div class="form-group mt-2"><label class="form-label">Note</label><textarea name="note" class="form-control" rows="2"></textarea></div>
  <div class="mt-4 flex gap-2"><button type="submit" class="btn btn-primary">Add Staff</button><a href="{{ url_for('staff_list') }}" class="btn btn-secondary">Cancel</a></div>
</form></div></div>{% endblock %}
