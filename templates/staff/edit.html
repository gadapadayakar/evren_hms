{% extends 'base.html' %}{% block title %}Edit Staff{% endblock %}{% block page_title %}Edit Staff{% endblock %}{% block content %}
<div class="page-header"><div><h1>Edit: {{ member.name }} {{ member.surname }}</h1></div><a href="{{ url_for('staff_list') }}" class="btn btn-secondary">← Back</a></div>
<div class="card"><div class="card-body"><form method="POST">
  <div class="form-grid">
    <div class="form-group"><label class="form-label">First Name *</label><input type="text" name="name" class="form-control" value="{{ member.name }}" required></div>
    <div class="form-group"><label class="form-label">Last Name</label><input type="text" name="surname" class="form-control" value="{{ member.surname or '' }}"></div>
    <div class="form-group"><label class="form-label">Email *</label><input type="email" name="email" class="form-control" value="{{ member.email }}" required></div>
    <div class="form-group"><label class="form-label">Phone</label><input type="text" name="phone" class="form-control" value="{{ member.phone or '' }}"></div>
    <div class="form-group"><label class="form-label">Mobile</label><input type="text" name="mobileno" class="form-control" value="{{ member.mobileno or '' }}"></div>
    <div class="form-group"><label class="form-label">Gender</label><select name="gender" class="form-control">{% for g in ['','Male','Female','Other'] %}<option {% if member.gender==g %}selected{% endif %}>{{ g }}</option>{% endfor %}</select></div>
    <div class="form-group"><label class="form-label">Blood Group</label><select name="blood_group" class="form-control">{% for bg in ['','A+','A-','B+','B-','AB+','AB-','O+','O-'] %}<option {% if member.blood_group==bg %}selected{% endif %}>{{ bg }}</option>{% endfor %}</select></div>
    <div class="form-group"><label class="form-label">DOB</label><input type="date" name="dob" class="form-control" value="{{ member.dob or '' }}"></div>
    <div class="form-group"><label class="form-label">Joining Date</label><input type="date" name="date_of_joining" class="form-control" value="{{ member.date_of_joining or '' }}"></div>
    <div class="form-group"><label class="form-label">Department</label><select name="department" class="form-control"><option value="">Select…</option>{% for d in departments %}<option value="{{ d.id }}" {% if member.department==d.id %}selected{% endif %}>{{ d.department_name }}</option>{% endfor %}</select></div>
    <div class="form-group"><label class="form-label">Designation</label><select name="designation" class="form-control"><option value="">Select…</option>{% for d in designations %}<option value="{{ d.id }}" {% if member.designation==d.id %}selected{% endif %}>{{ d.designation }}</option>{% endfor %}</select></div>
    <div class="form-group"><label class="form-label">Qualification</label><input type="text" name="qualification" class="form-control" value="{{ member.qualification or '' }}"></div>
    <div class="form-group"><label class="form-label">Experience</label><input type="text" name="experience" class="form-control" value="{{ member.experience or '' }}"></div>
    <div class="form-group"><label class="form-label">Basic Salary</label><input type="number" name="basic_salary" class="form-control" step="0.01" value="{{ member.basic_salary or 0 }}"></div>
    <div class="form-group"><label class="form-label">Bank Name</label><input type="text" name="bank_name" class="form-control" value="{{ member.bank_name or '' }}"></div>
    <div class="form-group"><label class="form-label">Bank Account</label><input type="text" name="bank_account" class="form-control" value="{{ member.bank_account or '' }}"></div>
    <div class="form-group"><label class="form-label">Emergency Contact</label><input type="text" name="emergency_contact" class="form-control" value="{{ member.emergency_contact or '' }}"></div>
  </div>
  <div class="form-group mt-3"><label class="form-label">Address</label><textarea name="address" class="form-control">{{ member.address or '' }}</textarea></div>
  <div class="form-group mt-2"><label class="form-label">Note</label><textarea name="note" class="form-control">{{ member.note or '' }}</textarea></div>
  <div class="mt-4 flex gap-2"><button type="submit" class="btn btn-primary">Update Staff</button><a href="{{ url_for('staff_list') }}" class="btn btn-secondary">Cancel</a></div>

  <div class="form-section">Reset Password (leave blank to keep current)</div>
  <div class="form-grid">
    <div class="form-group"><label class="form-label">New Password</label>
      <input type="text" name="new_password" class="form-control" placeholder="Enter new password to reset"></div>
  </div>
</form></div></div>{% endblock %}
