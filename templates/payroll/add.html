{% extends 'base.html' %}
{% block title %}Add Payroll{% endblock %}
{% block page_title %}Add Payroll{% endblock %}
{% block content %}
<div class="page-header"><div><h1>Add Payroll Entry</h1></div><a href="{{ url_for('payroll_list') }}" class="btn btn-secondary">Back</a></div>
<div class="card"><div class="card-body"><form method="POST">
  <div class="form-grid">
    <div class="form-group"><label class="form-label">Staff *</label>
      <select name="staff_id" class="form-control" required>
        <option value="">Select...</option>
        {% for s in staff %}<option value="{{ s.id }}">{{ s.name }} {{ s.surname }} ({{ s.employee_id }}) — Basic: {{ s.basic_salary }}</option>{% endfor %}
      </select></div>
    <div class="form-group"><label class="form-label">Month</label>
      <select name="month" class="form-control">{% for m in months %}<option>{{ m }}</option>{% endfor %}</select></div>
    <div class="form-group"><label class="form-label">Year</label><input type="number" name="year" class="form-control" value="{{ current_year }}"></div>
    <div class="form-group"><label class="form-label">Basic Salary</label><input type="number" name="basic_salary" class="form-control" step="0.01" value="0"></div>
    <div class="form-group"><label class="form-label">Allowances</label><input type="number" name="allowances" class="form-control" step="0.01" value="0"></div>
    <div class="form-group"><label class="form-label">Deductions</label><input type="number" name="deductions" class="form-control" step="0.01" value="0"></div>
    <div class="form-group"><label class="form-label">Payment Status</label>
      <select name="payment_status" class="form-control"><option value="unpaid">Unpaid</option><option value="paid">Paid</option></select></div>
  </div>
  <div class="form-group mt-3"><label class="form-label">Note</label><textarea name="note" class="form-control" rows="2"></textarea></div>
  <div class="mt-4 flex gap-2"><button type="submit" class="btn btn-primary">Save Payroll</button><a href="{{ url_for('payroll_list') }}" class="btn btn-secondary">Cancel</a></div>
</form></div></div>
{% endblock %}
