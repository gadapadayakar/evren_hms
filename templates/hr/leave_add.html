{% extends 'base.html' %}
{% block title %}Apply Leave{% endblock %}
{% block page_title %}Apply Leave{% endblock %}
{% block content %}
<div class="page-header"><div><h1>Apply Leave</h1></div><a href="{{ url_for('hr_leave') }}" class="btn btn-secondary">Back</a></div>
<div class="card"><div class="card-body"><form method="POST">
  <div class="form-grid">
    <div class="form-group"><label class="form-label">Staff *</label>
      <select name="staff_id" class="form-control" required>
        <option value="">Select...</option>
        {% for s in staff %}<option value="{{ s.id }}">{{ s.name }} {{ s.surname }} ({{ s.employee_id }})</option>{% endfor %}
      </select></div>
    <div class="form-group"><label class="form-label">Leave Type *</label>
      <select name="leave_type_id" class="form-control" required>
        <option value="">Select...</option>
        {% for lt in leave_types %}<option value="{{ lt.id }}">{{ lt.name }} ({{ lt.days_allowed }} days/yr)</option>{% endfor %}
      </select></div>
    <div class="form-group"><label class="form-label">From Date *</label><input type="date" name="from_date" class="form-control" value="{{ today }}" required></div>
    <div class="form-group"><label class="form-label">To Date *</label><input type="date" name="to_date" class="form-control" value="{{ today }}" required></div>
  </div>
  <div class="form-group mt-3"><label class="form-label">Reason</label><textarea name="reason" class="form-control" rows="3"></textarea></div>
  <div class="mt-4 flex gap-2"><button type="submit" class="btn btn-primary">Submit</button><a href="{{ url_for('hr_leave') }}" class="btn btn-secondary">Cancel</a></div>
</form></div></div>
{% endblock %}
