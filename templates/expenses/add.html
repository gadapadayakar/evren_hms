{% extends 'base.html' %}{% block title %}Add Expense{% endblock %}{% block page_title %}Add Expense{% endblock %}{% block content %}
<div class="page-header"><div><h1>Add Expense</h1></div><a href="{{ url_for('expenses_list') }}" class="btn btn-secondary">← Back</a></div>
<div class="card"><div class="card-body"><form method="POST">
  <div class="form-grid">
    <div class="form-group"><label class="form-label">Name / Description *</label><input type="text" name="name" class="form-control" required></div>
    <div class="form-group"><label class="form-label">Category</label>
      <select name="exp_head_id" class="form-control"><option value="">Select…</option>{% for h in heads %}<option value="{{ h.id }}">{{ h.exp_category }}</option>{% endfor %}</select></div>
    <div class="form-group"><label class="form-label">Invoice No</label><input type="text" name="invoice_no" class="form-control"></div>
    <div class="form-group"><label class="form-label">Amount *</label><input type="number" name="amount" class="form-control" step="0.01" required value="0"></div>
    <div class="form-group"><label class="form-label">Date</label><input type="date" name="date" class="form-control" value="{{ today }}"></div>
  </div>
  <div class="form-group mt-3"><label class="form-label">Note</label><textarea name="note" class="form-control" rows="2"></textarea></div>
  <div class="mt-4 flex gap-2"><button type="submit" class="btn btn-danger">Save Expense</button><a href="{{ url_for('expenses_list') }}" class="btn btn-secondary">Cancel</a></div>
</form></div></div>{% endblock %}
