{% extends 'base.html' %}{% block title %}Add Donation{% endblock %}{% block page_title %}Record Blood Donation{% endblock %}{% block content %}
<div class="page-header"><div><h1>Record Blood Donation</h1></div><a href="{{ url_for('bloodbank') }}" class="btn btn-secondary">← Back</a></div>
<div class="card"><div class="card-body"><form method="POST">
  <div class="form-grid">
    <div class="form-group"><label class="form-label">Donor Name *</label><input type="text" name="donor_name" class="form-control" required></div>
    <div class="form-group"><label class="form-label">Blood Group *</label>
      <select name="blood_group" class="form-control" required>{% for bg in blood_groups %}<option>{{ bg }}</option>{% endfor %}</select></div>
    <div class="form-group"><label class="form-label">Contact</label><input type="text" name="donor_contact" class="form-control"></div>
    <div class="form-group"><label class="form-label">Donor Age</label><input type="number" name="donor_age" class="form-control" min="18" max="65"></div>
    <div class="form-group"><label class="form-label">Donation Date</label><input type="date" name="donation_date" class="form-control" value="{{ today }}"></div>
    <div class="form-group"><label class="form-label">Units Donated</label><input type="number" name="units_donated" class="form-control" value="1" min="1"></div>
    <div class="form-group"><label class="form-label">Expiry Date</label><input type="date" name="expiry_date" class="form-control"></div>
  </div>
  <div class="form-group mt-3"><label class="form-label">Note</label><textarea name="note" class="form-control" rows="2"></textarea></div>
  <div class="mt-4 flex gap-2"><button type="submit" class="btn btn-success">Record Donation</button><a href="{{ url_for('bloodbank') }}" class="btn btn-secondary">Cancel</a></div>
</form></div></div>{% endblock %}
