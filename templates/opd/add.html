{% extends 'base.html' %}{% block title %}Add OPD{% endblock %}{% block page_title %}Add OPD Visit{% endblock %}{% block content %}
<div class="page-header"><div><h1>New OPD Visit</h1></div><a href="{{ url_for('opd') }}" class="btn btn-secondary">← Back</a></div>
<div class="card"><div class="card-body"><form method="POST">
  <div class="form-grid">
    <div class="form-group"><label class="form-label">Patient *</label>
      <select name="patient_id" class="form-control" required><option value="">Select…</option>{% for p in patients %}<option value="{{ p.id }}">{{ p.patient_name }} ({{ p.patient_unique_id }})</option>{% endfor %}</select></div>
    <div class="form-group"><label class="form-label">Doctor</label>
      <select name="cons_doctor" class="form-control"><option value="">Select…</option>{% for d in doctors %}<option value="{{ d.id }}">{{ d.name }} {{ d.surname }}</option>{% endfor %}</select></div>
    <div class="form-group"><label class="form-label">Date</label><input type="date" name="date" class="form-control" value="{{ today }}"></div>
    <div class="form-group"><label class="form-label">Charge</label><input type="number" name="charge" class="form-control" step="0.01" value="0"></div>
    <div class="form-group"><label class="form-label">Payment Status</label>
      <select name="payment_status" class="form-control"><option value="unpaid">Unpaid</option><option value="paid">Paid</option></select></div>
    <div class="form-group"><label class="form-label">TPA / Insurance</label>
      <select name="tpa_id" class="form-control"><option value="0">None</option>{% for t in tpa_list %}<option value="{{ t.id }}">{{ t.organisation_name }}</option>{% endfor %}</select></div>
    <div class="form-group"><label class="form-label">Follow-up Date</label><input type="date" name="follow_up" class="form-control"></div>
  </div>
  <div class="form-group mt-3"><label class="form-label">Symptoms</label><textarea name="symptoms" class="form-control"></textarea></div>
  <div class="form-group mt-2"><label class="form-label">Notes</label><textarea name="note" class="form-control" rows="2"></textarea></div>
  <div class="mt-4 flex gap-2"><button type="submit" class="btn btn-primary">Save OPD</button><a href="{{ url_for('opd') }}" class="btn btn-secondary">Cancel</a></div>
</form></div></div>{% endblock %}
