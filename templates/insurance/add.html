{% extends 'base.html' %}{% block title %}Add TPA{% endblock %}{% block page_title %}Add Insurance/TPA{% endblock %}{% block content %}
<div class="page-header"><div><h1>Add Insurance / TPA</h1></div><a href="{{ url_for('insurance') }}" class="btn btn-secondary">← Back</a></div>
<div class="card"><div class="card-body"><form method="POST">
  <div class="form-grid">
    <div class="form-group"><label class="form-label">Organisation Name *</label><input type="text" name="organisation_name" class="form-control" required></div>
    <div class="form-group"><label class="form-label">Contact Person</label><input type="text" name="contact_person" class="form-control"></div>
    <div class="form-group"><label class="form-label">Email</label><input type="email" name="email" class="form-control"></div>
    <div class="form-group"><label class="form-label">Phone</label><input type="text" name="phone" class="form-control"></div>
    <div class="form-group"><label class="form-label">Coverage Limit</label><input type="number" name="coverage_limit" class="form-control" step="0.01" value="0"></div>
  </div>
  <div class="form-group mt-3"><label class="form-label">Address</label><textarea name="address" class="form-control"></textarea></div>
  <div class="form-group mt-2"><label class="form-label">Policy Details</label><textarea name="policy_details" class="form-control"></textarea></div>
  <div class="mt-4 flex gap-2"><button type="submit" class="btn btn-primary">Add TPA</button><a href="{{ url_for('insurance') }}" class="btn btn-secondary">Cancel</a></div>
</form></div></div>{% endblock %}
